<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scribe Early Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#F0EAE0;
    --surface:rgba(26,23,20,0.04);
    --border:rgba(26,23,20,0.1);
    --border-hover:rgba(26,23,20,0.25);
    --text:#1A1714;
    --muted:rgba(26,23,20,0.5);
    --faint:rgba(26,23,20,0.28);
    --cream:#F0EAE0;
    --accent:#c97070;
  }

  html,body{height:100%;background:var(--bg)}

  body{
    font-family:'DM Sans',sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 24px 64px;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* Subtle radial glow top center */
  body::before{
    content:'';
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    height:500px;
    background:radial-gradient(ellipse at center, rgba(180,140,100,0.06) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:640px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
  }

  /* ── Logo ── */
  .logo-wrap{
    margin-top:80px;
    margin-bottom:48px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.1s forwards;
  }
  .logo-wrap img{
    width:220px;
    /* Invert so it's cream/white on dark bg */
    filter:none;
  }

  /* ── Headline ── */
  .headline{
    font-family:'Instrument Serif',serif;
    font-size:clamp(50px,7vw,72px);
    font-weight:400;
    line-height:1.15;
    text-align:center;
    color:var(--text);
    letter-spacing:-0.02em;
    margin-bottom:16px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.2s forwards;
  }
  .headline em{
    font-style:italic;
    color:var(--accent);
  }

  .sub{
    font-size:19px;
    font-weight:300;
    color:var(--muted);
    text-align:center;
    line-height:1.6;
    margin-bottom:48px;
    max-width:480px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.3s forwards;
  }

  /* ── Features ── */
  .features{
    display:flex;
    gap:10px;
    margin-bottom:44px;
    flex-wrap:wrap;
    justify-content:center;
    opacity:0;
    animation:fadeUp 0.7s ease 0.4s forwards;
  }
  .feat{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    border:0.5px solid var(--border);
    border-radius:100px;
    font-size:14px;
    font-weight:400;
    color:var(--muted);
    letter-spacing:0.01em;
    background:var(--surface);
  }
  .feat-dot{
    width:5px;height:5px;
    border-radius:50%;
    background:var(--accent);
    flex-shrink:0;
  }

  /* ── Counter ── */
  .counter{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.5s forwards;
  }
  .avatars{display:flex;align-items:center}
  .av{
    width:28px;height:28px;
    border-radius:50%;
    border:1.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:600;color:#fff;
    margin-left:-7px;flex-shrink:0;
  }
  .av:first-child{margin-left:0}
  .counter-text{font-size:15px;color:var(--muted)}
  .counter-text strong{color:var(--accent);font-weight:600}

  /* ── Form card ── */
  .form-card{
    width:100%;
    background:#FEFCF9;
    border:0.5px solid rgba(26,23,20,0.1);
    border-radius:20px;
    padding:44px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.55s forwards;
    box-shadow:0 4px 32px rgba(26,23,20,0.07);
  }

  .fields{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}

  .field{
    background:rgba(26,23,20,0.04);
    border:0.5px solid var(--border);
    border-radius:10px;
    padding:14px 18px;
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    font-weight:300;
    color:var(--text);
    width:100%;
    outline:none;
    transition:border-color 0.2s, background 0.2s;
    letter-spacing:0.02em;
  }
  .field::placeholder{color:var(--faint);font-size:13px;letter-spacing:0.08em;text-transform:uppercase}
  .field:focus{border-color:var(--border-hover);background:#fff}

  .btn{
    width:100%;
    padding:15px;
    background:var(--accent);
    color:#F0EAE0;
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:background 0.2s, transform 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:hover{background:#b85f5f;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-arrow{opacity:1;font-size:16px}

  .form-note{
    font-size:12px;
    color:var(--faint);
    text-align:center;
    margin-top:14px;
    letter-spacing:0.01em;
  }

  /* ── Success state ── */
  .success{
    display:none;
    text-align:center;
    padding:8px 0 4px;
  }
  .success-check{
    width:44px;height:44px;border-radius:50%;
    background:rgba(26,23,20,0.06);
    border:0.5px solid rgba(26,23,20,0.12);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;
    font-size:18px;
  }
  .success h3{
    font-family:'Instrument Serif',serif;
    font-size:22px;font-weight:400;
    color:var(--text);margin-bottom:6px;
  }
  .success p{font-size:13px;color:var(--muted);line-height:1.5}

  /* ── Footer ── */
  .footer{
    margin-top:40px;
    font-size:13px;
    color:var(--faint);
    text-align:center;
    letter-spacing:0.04em;
    opacity:0;
    animation:fadeUp 0.7s ease 0.7s forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media(max-width:520px){
    .form-card{padding:24px 20px;border-radius:16px}
    .features{gap:8px}
    .feat{font-size:13px;padding:6px 12px}
  }


  .built-for-pill{gap:7px !important}
  .built-pill-label{font-size:13px;color:var(--muted);font-weight:400;}


  /* ── Kit form overrides ── */
  .seva-form.formkit-form{background:transparent !important;border:none !important;padding:0 !important;box-shadow:none !important;margin:0 !important;max-width:100% !important;}
  .formkit-fields{display:flex !important;flex-direction:column !important;gap:10px !important;width:100% !important;}
  .formkit-field{margin:0 !important;width:100% !important;}
  .formkit-input{
    background:rgba(26,23,20,0.05) !important;
    border:0.5px solid rgba(26,23,20,0.14) !important;
    border-radius:10px !important;
    color:#1A1714 !important;
    font-family:'DM Sans',sans-serif !important;
    font-size:15px !important;
    font-weight:400 !important;
    padding:17px 20px !important;
    width:100% !important;
    outline:none !important;
    box-shadow:none !important;
  }
  .formkit-input::placeholder{color:rgba(26,23,20,0.35) !important;font-size:13px !important;text-transform:uppercase !important;letter-spacing:0.08em !important;}
  .formkit-input:focus{border-color:rgba(26,23,20,0.35) !important;background:#fff !important;}
  .formkit-submit{
    width:100% !important;
    padding:18px !important;
    background:var(--accent) !important;
    color:#F0EAE0 !important;
    font-family:'DM Sans',sans-serif !important;
    font-size:14px !important;
    font-weight:600 !important;
    letter-spacing:0.1em !important;
    text-transform:uppercase !important;
    border:none !important;
    border-radius:10px !important;
    cursor:pointer !important;
    margin:0 !important;
    box-shadow:none !important;
  }
  .formkit-submit:hover{background:#b85f5f !important;transform:translateY(-1px) !important;}
  .formkit-submit > span{padding:0 !important;}
  .formkit-spinner{display:none !important;}
  .formkit-powered-by-convertkit-container{opacity:0.2 !important;filter:grayscale(1) !important;justify-content:center !important;margin-top:8px !important;}
  .formkit-alert{display:none !important;}
  .formkit-alert:not(:empty){display:block !important;background:rgba(200,80,60,0.08) !important;border:0.5px solid rgba(200,80,60,0.2) !important;border-radius:8px !important;color:#c05040 !important;font-size:13px !important;padding:10px 14px !important;margin-bottom:8px !important;}

</style>
