<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scribe — Early Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#F0EAE0;
    --surface:rgba(26,23,20,0.04);
    --border:rgba(26,23,20,0.1);
    --border-hover:rgba(26,23,20,0.25);
    --text:#1A1714;
    --muted:rgba(26,23,20,0.5);
    --faint:rgba(26,23,20,0.28);
    --cream:#F0EAE0;
    --accent:#c97070;
  }

  html,body{height:100%;background:var(--bg)}

  body{
    font-family:'DM Sans',sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 24px 64px;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* Subtle radial glow top center */
  body::before{
    content:'';
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    height:500px;
    background:radial-gradient(ellipse at center, rgba(180,140,100,0.06) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:640px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
  }

  /* ── Logo ── */
  .logo-wrap{
    margin-top:80px;
    margin-bottom:48px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.1s forwards;
  }
  .logo-wrap img{
    width:560px;
    /* Invert so it's cream/white on dark bg */
    filter:none;
  }

  /* ── Headline ── */
  .headline{
    font-family:'Instrument Serif',serif;
    font-size:clamp(50px,7vw,72px);
    font-weight:400;
    line-height:1.15;
    text-align:center;
    color:var(--text);
    letter-spacing:-0.02em;
    margin-bottom:16px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.2s forwards;
  }
  .headline em{
    font-style:italic;
    color:var(--accent);
  }

  .sub{
    font-size:19px;
    font-weight:300;
    color:var(--muted);
    text-align:center;
    line-height:1.6;
    margin-bottom:48px;
    max-width:480px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.3s forwards;
  }

  /* ── Features ── */
  .features{
    display:flex;
    gap:10px;
    margin-bottom:44px;
    flex-wrap:wrap;
    justify-content:center;
    opacity:0;
    animation:fadeUp 0.7s ease 0.4s forwards;
  }
  .feat{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    border:0.5px solid var(--border);
    border-radius:100px;
    font-size:14px;
    font-weight:400;
    color:var(--muted);
    letter-spacing:0.01em;
    background:var(--surface);
  }
  .feat-dot{
    width:5px;height:5px;
    border-radius:50%;
    background:var(--accent);
    flex-shrink:0;
  }

  /* ── Counter ── */
  .counter{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.5s forwards;
  }
  .avatars{display:flex;align-items:center}
  .av{
    width:28px;height:28px;
    border-radius:50%;
    border:1.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:600;color:#fff;
    margin-left:-7px;flex-shrink:0;
  }
  .av:first-child{margin-left:0}
  .counter-text{font-size:15px;color:var(--muted)}
  .counter-text strong{color:var(--accent);font-weight:600}

  /* ── Form card ── */
  .form-card{
    width:100%;
    background:#FEFCF9;
    border:0.5px solid rgba(26,23,20,0.1);
    border-radius:20px;
    padding:44px;
    opacity:0;
    animation:fadeUp 0.7s ease 0.55s forwards;
    box-shadow:0 4px 32px rgba(26,23,20,0.07);
  }

  .fields{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}

  .field{
    background:rgba(26,23,20,0.04);
    border:0.5px solid var(--border);
    border-radius:10px;
    padding:14px 18px;
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    font-weight:300;
    color:var(--text);
    width:100%;
    outline:none;
    transition:border-color 0.2s, background 0.2s;
    letter-spacing:0.02em;
  }
  .field::placeholder{color:var(--faint);font-size:13px;letter-spacing:0.08em;text-transform:uppercase}
  .field:focus{border-color:var(--border-hover);background:#fff}

  .btn{
    width:100%;
    padding:15px;
    background:var(--accent);
    color:#F0EAE0;
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:background 0.2s, transform 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:hover{background:#b85f5f;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-arrow{opacity:1;font-size:16px}

  .form-note{
    font-size:12px;
    color:var(--faint);
    text-align:center;
    margin-top:14px;
    letter-spacing:0.01em;
  }

  /* ── Success state ── */
  .success{
    display:none;
    text-align:center;
    padding:8px 0 4px;
  }
  .success-check{
    width:44px;height:44px;border-radius:50%;
    background:rgba(26,23,20,0.06);
    border:0.5px solid rgba(26,23,20,0.12);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;
    font-size:18px;
  }
  .success h3{
    font-family:'Instrument Serif',serif;
    font-size:22px;font-weight:400;
    color:var(--text);margin-bottom:6px;
  }
  .success p{font-size:13px;color:var(--muted);line-height:1.5}

  /* ── Footer ── */
  .footer{
    margin-top:40px;
    font-size:13px;
    color:var(--faint);
    text-align:center;
    letter-spacing:0.04em;
    opacity:0;
    animation:fadeUp 0.7s ease 0.7s forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media(max-width:520px){
    .form-card{padding:24px 20px;border-radius:16px}
    .features{gap:8px}
    .feat{font-size:13px;padding:6px 12px}
  }


  .built-for-pill{gap:7px !important}
  .built-pill-label{font-size:13px;color:var(--muted);font-weight:400;}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  if(KIT_FORM_ID !== 'YOUR_FORM_ID'){
    fetch(`https://api.convertkit.com/v3/forms/${KIT_FORM_ID}?api_key=${KIT_API_KEY}`)
      .then(r=>{if(!r.ok)throw new Error();return r.json();})
      .then(d=>{ updateCounter(d?.form?.subscribed_count); })
      .catch(()=>{});
  }

  function joinWaitlist(){
    const name=document.getElementById('fname').value.trim();
    const email=document.getElementById('femail').value.trim();
    if(!name||!email){
      const el=!name?document.getElementById('fname'):document.getElementById('femail');
      el.style.borderColor='rgba(180,80,60,0.5)';
      el.focus();
      setTimeout(()=>el.style.borderColor='',1800);
      return;
    }

    // Submit to Kit
    const data=new FormData();
    data.append('email_address', email);
    data.append('fields[first_name]', name);

    fetch('https://app.kit.com/forms/a1b454237e/subscriptions', {
      method:'POST',
      body:data,
      mode:'no-cors'
    }).catch(()=>{});

    // Show success
    document.getElementById('form-area').style.display='none';
    document.getElementById('success').style.display='block';

    // Update counter
    const cur=parseInt((document.getElementById('count').textContent||'0').replace(/,/g,''))||0;
    updateCounter(cur+1);

    // Add Gravatar avatar
    const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const hash=typeof md5==='function'?md5(email.trim().toLowerCase()):'';
    const av=document.createElement('div');
    av.className='av';
    if(hash){
      const img=document.createElement('img');
      img.src=`https://www.gravatar.com/avatar/${hash}?s=60&d=404`;
      img.style.cssText='width:100%;height:100%;border-radius:50%;object-fit:cover;';
      img.onerror=()=>{img.remove();av.textContent=initials;av.style.background='#c97070';av.style.fontSize='10px';av.style.fontWeight='600';av.style.color='#fff';};
      av.appendChild(img);
    } else {
      av.textContent=initials;
      av.style.background='#c97070';
      av.style.fontSize='10px';
      av.style.fontWeight='600';
      av.style.color='#fff';
    }
    document.getElementById('av-wrap').appendChild(av);
  }


</script>
